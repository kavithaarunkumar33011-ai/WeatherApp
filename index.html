<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
     <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Glassmorphism Background */
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;;
    }

    /* Glass Card Effect */
    .glass-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
    }

    /* Search Box Glow */
    .input-group .form-control:focus {
      border-color: rgba(255, 255, 255, 0.5);
      box-shadow: 0 0 0 0.25rem rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }
    .input-group .form-control {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
    }
    .input-group .form-control::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    /* Button Style */
    .btn-glass {
      background: rgba(255, 255, 255, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      font-weight: 600;
    }
    .btn-glass:hover {
      background: rgba(255, 255, 255, 0.4);
      color: white;
    }

    /* Weather Icon Animation */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    #weatherIcon {
      animation: float 3s ease-in-out infinite;
    }

    /* Temp Text Glow */
    #temp {
      text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body class="d-flex align-items-center"> 
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        
        <h1 class="text-center mb-4 text-white fw-bold">Weather App</h1>
        
        <!-- Search Form - Glass Style -->
        <div class="input-group mb-4">
          <input type="text" id="cityInput" class="form-control form-control-lg" placeholder="Enter city name" value="Chennai">
          <button id="searchBtn" class="btn btn-glass btn-lg">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </div>

        <!-- Weather Card - Glassmorphism -->
        <div id="weatherCard" class="card d-none text-center glass-card rounded-5 text-white">
          <div class="card-body p-5">
            <img id="weatherIcon" width="140" class="mx-auto d-block mb-3" src="" alt="weather">
            <h2 id="cityName" class="card-title fw-light">City</h2>
            <h1 id="temp" class="display-1 fw-bold mb-0"></h1>
            <p id="desc" class="lead text-capitalize mb-4">Weather</p>
            
            <div class="row g-3">
              <div class="col-6">
                <div class="p-3 rounded-4" style="background: rgba(255,255,255,0.1);">
                  <i class="fa-solid fa-droplet mb-2"></i>
                  <p class="mb-0 small">Humidity</p>
                  <p id="humidity" class="fw-bold mb-0">0%</p>
                </div>
                </div>
              <div class="col-6">
                <div class="p-3 rounded-4" style="background: rgba(255,255,255,0.1);">
                  <i class="fa-solid fa-wind mb-2"></i>
                  <p class="mb-0 small">Wind</p>
                  <p id="wind" class="fw-bold mb-0">0 m/s</p>
                </div>
              </div>
            </div>
         
        

        <div id="errorMsg" class="alert alert-danger d-none mt-3 text-center glass-card"></div>

      </div>
    </div>
  </div> 
  <script src="indes.js"></script>
</body>
</html>
